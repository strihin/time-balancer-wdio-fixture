name: Run WDIO Fixture Tests

on:
  repository_dispatch:
    types: [run-wdio]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run WDIO tests
        env:
          SAUCE_USER: ${{ secrets.SAUCE_USER }}
          SAUCE_PASS: ${{ secrets.SAUCE_PASS }}
        run: yarn test:log

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wdio-test-results
          path: .logs/test_results.log
          retention-days: 7
